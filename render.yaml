services:
  - type: web
    name: stockapp-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
