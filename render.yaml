services:
  - type: web
    name: stockapp-backend
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
